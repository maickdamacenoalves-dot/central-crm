version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: crm-postgres-prod
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  redis:
    image: redis:7-alpine
    container_name: crm-redis-prod
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: crm-api-prod
    restart: always
    command: ["node", "--env-file=.env", "src/server.js"]
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - uploads:/app/uploads
      - ./google-credentials.json:/app/google-credentials.json:ro
    networks:
      - internal
    expose:
      - "3000"

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=https://crm.centraldetintas.com
        - NEXT_PUBLIC_SOCKET_URL=https://crm.centraldetintas.com
    container_name: crm-web-prod
    restart: always
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=https://crm.centraldetintas.com
      - NEXT_PUBLIC_SOCKET_URL=https://crm.centraldetintas.com
    depends_on:
      - api
    networks:
      - internal
    expose:
      - "3001"

  nginx:
    image: nginx:alpine
    container_name: crm-nginx-prod
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - certbot-etc:/etc/letsencrypt
      - certbot-var:/var/lib/letsencrypt
      - certbot-www:/var/www/certbot
    depends_on:
      - api
      - web
    networks:
      - internal

  certbot:
    image: certbot/certbot
    container_name: crm-certbot
    volumes:
      - certbot-etc:/etc/letsencrypt
      - certbot-var:/var/lib/letsencrypt
      - certbot-www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot --quiet; sleep 12h & wait $${!}; done'"
    # Para emitir o certificado pela primeira vez, execute:
    # docker compose -f docker-compose.prod.yml run --rm certbot certonly --webroot -w /var/www/certbot -d crm.centraldetintas.com --email admin@centraldetintas.com --agree-tos --no-eff-email

volumes:
  pgdata:
  redisdata:
  uploads:
  certbot-etc:
  certbot-var:
  certbot-www:

networks:
  internal:
    driver: bridge
